<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <h1>BlockURL Sync Server</h1>
    <section id="blocked-page-section">
        <table>
            <tr>
                <td><label for="sync-server-url">Sync Server URL</label></td>
                <td><input type="text" id="sync-server-url" name="sync-server-url" /></td>
                <td rowspan="2"><button id="save-sync-button">Save</button></td>
            </tr>
            <tr>
                <td><label for="api-key">API Key</label></td>
                <td><input type="password" id="api-key" name="api-key" placeholder="Leave blank if no key is set" /></td>
            </tr>
        </table>
    </section>
    <script type="module" src="options.js"></script>
</body>

</html>
